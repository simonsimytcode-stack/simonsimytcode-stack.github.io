<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>auliaazzahra | To-Do List</title>
    <style>
    /* --- CSS Variables for Light/Dark Mode --- */
    :root {
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-color: #1f2937;
      --text-muted: #4b5563;
      --primary-color: #4f46e5;
      --border-color: #e5e7eb;
    }

    [data-theme="dark"] {
      --bg-color: #111827;
      --card-bg: #1f2937;
      --text-color: #f9fafb;
      --text-muted: #9ca3af;
      --primary-color: #6366f1;
      --border-color: #374151;
    }

    /* --- Base Styles --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 1100px; /* Diperlebar agar muat dengan box kiri baru */
      margin: 0 auto;
    }

    /* --- Layout Wrapper (Baru) --- */
    .layout-wrapper {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    /* --- Left Nav Box (Baru) --- */
    .left-nav-box {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      width: 220px;
      flex-shrink: 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 20px;
    }

    .left-nav-box ul {
      list-style: none;
      padding: 0;
    }

    .left-nav-box li {
      margin-bottom: 15px;
    }

    .left-nav-box li:last-child {
      margin-bottom: 0;
    }

    .left-nav-box a {
      color: var(--text-color);
      text-decoration: none;
      font-weight: bold;
      display: block;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .left-nav-box a:hover {
      background: var(--border-color);
      color: var(--primary-color);
    }

    /* --- Main Content Area (Baru) --- */
    .main-content {
      flex-grow: 1;
    }

    /* --- Header & Theme Toggle --- */
    header {
      display: flex;
      justify-content: flex-end;
      padding: 10px 0;
    }

    .theme-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    /* --- Profile Section --- */
    .profile-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 4px solid var(--primary-color);
    }

    .profile-card h1 {
      font-size: 2.2rem;
      margin-bottom: 5px;
    }

    .profile-card .title {
      color: var(--primary-color);
      font-weight: bold;
      margin-bottom: 15px;
    }

    .profile-card .bio {
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* --- Skills Section --- */
    .section-title {
      font-size: 1.5rem;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--primary-color);
      display: inline-block;
      padding-bottom: 4px;
    }

    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 4px;
    }

    .skill-badge {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    /* --- Contact Section --- */
    .contact-info {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 25px;
      margin-top: 30px;
    }

    .contact-item {
      margin-bottom: 10px;
    }

    .contact-item strong {
      color: var(--primary-color);
    }

    .contact-item a {
      color: var(--text-color);
      text-decoration: none;
    }

    .contact-item a:hover {
      text-decoration: underline;
    }

    /* Responsive untuk layar kecil */
    @media (max-width: 768px) {
      .layout-wrapper {
        flex-direction: column;
      }
      .left-nav-box {
        width: 100%;
        position: static;
      }
    }
.todo-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 32px;
  box-shadow: var(--shadow);
}

.todo-card h1 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 24px;
}

.input-group {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}

#todoInput {
  flex-grow: 1;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  background: var(--bg-color);
  color: var(--text-color);
  font-size: 1rem;
  outline: none;
}

#todoInput:focus {
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
}

.add-btn {
  background: var(--primary-color);
  color: white;
  border: none;
  padding: 0 24px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 1rem;
}

.add-btn:hover {
  background: var(--primary-hover);
}
#todoList {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#todoList li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg-color);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  animation: fadeIn 0.2s ease; /* Fade-in effect when adding tasks */
}

.task-left {
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  flex-grow: 1;
}

.task-left input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--primary-color);
  cursor: pointer;
}

.task-text {
  font-size: 1rem;
  font-weight: 500;
}

#todoList li.completed {
  opacity: 0.6;
}

#todoList li.completed .task-text {
  text-decoration: line-through;
}

.delete-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  line-height: 1;
  padding: 4px;
  border-radius: 6px;
}

.delete-btn:hover {
  color: var(--danger-color);
  background: rgba(239, 68, 68, 0.1);
}
/* --- Clear All Button - Upgrade Versi Cantik --- */
    .clear-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 28px; /* Jarak atas sedikit lebih longgar agar bernapas */
    }

    .clear-all-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border-color);
      padding: 10px 20px;
      border-radius: 12px; /* Melengkung modern menyesuaikan input box */
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.3px; /* Jarak text sedikit lebih rapi */
      display: inline-flex;
      align-items: center;
      gap: 8px; /* Jarak antara emoji sapu dan teks */
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); /* Transisi animasi premium */
    }

    /* Efek saat kursor mendekat (Hover) */
    .clear-all-btn:hover {
      background: rgba(239, 68, 68, 0.08); /* Efek merah transparan yang sangat lembut */
      color: var(--danger-color);
      border-color: var(--danger-color);
      transform: translateY(-2px); /* Tombol terangkat sedikit ke atas */
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15); /* Efek bayangan merah estetik */
    }

    /* Efek saat tombol ditekan/diklik (Active) */
    .clear-all-btn:active {
      transform: translateY(0); /* Kembali ke posisi semula */
      scale: 0.95; /* Efek membal mengecil saat ditekan */
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Dark Mode Toggle Button -->
    <header>
      <button class="theme-btn" id="themeToggle">Toggle Dark Mode</button>
    </header>

    <!-- Layout Wrapper -->
    <div class="layout-wrapper">
      
      <!-- Box Sebelah Kiri (Sama Persis dengan Page 1) -->
      <nav class="left-nav-box">
        <ul>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#skills">Skills</a></li>
          <li><a href="index.html#contact">Contact</a></li>
          <li><a href="2.html" style="color: var(--primary-color);">To-Do List →</a></li>
        </ul>
      </nav>

      <!-- Main Content Area -->
      <div class="main-content">
        <main>
          <!-- To-Do List yang dibungkus Card Layout -->
          <section class="todo-card">
            <h1>My To-Do List</h1>
            
            <div class="input-group">
              <input type="text" id="todoInput" placeholder="Tambah tugas baru...">
              <button class="add-btn" id="addBtn">Tambah</button>
            </div>

            <ul id="todoList"></ul>
            <div class="clear-container">
              <button class="clear-all-btn" id="clearAllBtn">🧹 Clear All Tasks</button>
            </div>

          </section>
        </main>
      </div>

    </div>
  </div>

  <!-- JavaScript untuk Dark Mode & To-Do List Logic -->
  <script>
    // --- Dark Mode Toggle ---
    const toggleBtn = document.getElementById('themeToggle');
    toggleBtn.addEventListener('click', () => {
      if (document.documentElement.getAttribute('data-theme') === 'dark') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    });

    // --- To-Do List Logic dengan LocalStorage ---
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function saveToLocalStorage() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      todoList.innerHTML = '';
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');

        li.innerHTML = `
          <div class="task-left" onclick="toggleTask(${index})">
            <input type="checkbox" ${task.completed ? 'checked' : ''}>
            <span class="task-text">${task.text}</span>
          </div>
          <button class="delete-btn" onclick="deleteTask(${index})">&times;</button>
        `;
        todoList.appendChild(li);
      });
    }

    function addTask() {
      const taskText = todoInput.value.trim();
      if (taskText === '') return;

      tasks.push({ text: taskText, completed: false });
      todoInput.value = '';
      saveToLocalStorage();
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveToLocalStorage();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveToLocalStorage();
      renderTasks();
    }

    addBtn.addEventListener('click', addTask);
    todoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    renderTasks();
const clearAllBtn = document.getElementById('clearAllBtn'); 

    // 2. TEMPELKAN LOGIKA INI di bagian bawah sebelum renderTasks()
    clearAllBtn.addEventListener('click', () => {
      if (confirm('Apakah kamu yakin ingin menghapus semua tugas?')) {
        tasks = [];
        saveToLocalStorage();
        renderTasks();
      }
    });

    renderTasks();
  </script>
</body>
</html>
